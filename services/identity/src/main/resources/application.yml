spring:
  application:
    name: identity
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mungcle}?currentSchema=identity
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: identity
    open-in-view: false
  flyway:
    schemas: identity
    locations: classpath:db/migration

server:
  port: 8081

grpc:
  server:
    port: 50051

jwt:
  secret: ${JWT_SECRET:mungcle-dev-secret-key-change-in-production}
  expiration: 604800000

tsid:
  node: ${TSID_NODE:2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        grpc.server.calls: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://${OTEL_HOST:localhost}:4318/v1/traces
