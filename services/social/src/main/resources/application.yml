spring:
  application:
    name: social
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mungcle}?currentSchema=social
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: social
    open-in-view: false
  flyway:
    schemas: social
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8084

grpc:
  server:
    port: 50054
  client:
    identity:
      address: static://${IDENTITY_HOST:localhost}:50051
      negotiation-type: plaintext
    pet-profile:
      address: static://${PET_PROFILE_HOST:localhost}:50052
      negotiation-type: plaintext
    walks:
      address: static://${WALKS_HOST:localhost}:50053
      negotiation-type: plaintext

tsid:
  node: ${TSID_NODE:5}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 80
    instances:
      identity-service:
        baseConfig: default
        # 인증 서비스 — social 서비스의 모든 요청이 의존하므로 보수적 설정.
        # 슬라이딩 윈도우를 넓혀 오탐(false positive) 감소.
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 30
        waitDurationInOpenState: 30s
      walks-service:
        baseConfig: default
        # 산책 서비스 — 실시간 위치/산책 데이터 조회 시 지연 허용 기준 완화.
        # social 서비스 관점에서 walks 데이터는 집계/피드용으로 일부 지연 허용.
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 15s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        grpc.server.calls: true
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}  # 개발: 1.0, 운영: 0.1 권장
  otlp:
    tracing:
      endpoint: http://${OTEL_HOST:localhost}:4318/v1/traces
