spring:
  application:
    name: walks
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mungcle}?currentSchema=walks
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: walks
    open-in-view: false
  flyway:
    schemas: walks
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8083

grpc:
  server:
    port: 50053
  client:
    identity:
      address: static://${IDENTITY_HOST:localhost}:50051
      negotiation-type: plaintext
    pet-profile:
      address: static://${PET_PROFILE_HOST:localhost}:50052
      negotiation-type: plaintext

tsid:
  node: ${TSID_NODE:4}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 80
    instances:
      identity-service:
        baseConfig: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        grpc.server.calls: true
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}  # 개발: 1.0, 운영: 0.1 권장
  otlp:
    tracing:
      endpoint: http://${OTEL_HOST:localhost}:4318/v1/traces
