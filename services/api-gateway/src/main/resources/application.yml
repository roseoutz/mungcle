server:
  port: 4000

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true

# gRPC client channels
grpc:
  client:
    identity:
      address: static://localhost:50051
      negotiation-type: plaintext
    pet-profile:
      address: static://localhost:50052
      negotiation-type: plaintext
    walks:
      address: static://localhost:50053
      negotiation-type: plaintext
    social:
      address: static://localhost:50054
      negotiation-type: plaintext
    notification:
      address: static://localhost:50055
      negotiation-type: plaintext

# JWT
jwt:
  secret: ${JWT_SECRET:mungcle-dev-secret-key-change-in-production}
  expiration: 604800000 # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
