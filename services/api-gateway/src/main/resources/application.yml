server:
  port: 4000

spring:
  application:
    name: api-gateway

# gRPC client channels
grpc:
  client:
    identity:
      address: static://${IDENTITY_HOST:localhost}:50051
      negotiation-type: plaintext
    pet-profile:
      address: static://${PET_PROFILE_HOST:localhost}:50052
      negotiation-type: plaintext
    walks:
      address: static://${WALKS_HOST:localhost}:50053
      negotiation-type: plaintext
    social:
      address: static://${SOCIAL_HOST:localhost}:50054
      negotiation-type: plaintext
    notification:
      address: static://${NOTIFICATION_HOST:localhost}:50055
      negotiation-type: plaintext

# JWT
jwt:
  secret: ${JWT_SECRET:mungcle-dev-secret-key-change-in-production}
  expiration: 604800000 # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents,retries,retryevents,timelimiters,bulkheads
  health:
    circuitbreakers:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        # api-gateway는 HTTP 전용 — gRPC 서버 히스토그램 불필요
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}  # 개발: 1.0, 운영: 0.1 권장
  otlp:
    tracing:
      endpoint: http://${OTEL_HOST:localhost}:4318/v1/traces

# Rate Limiting 설정
gateway:
  rate-limit:
    authenticated:
      limit: 100
      duration: 1m
    anonymous:
      limit: 20
      duration: 1m

# Resilience4j Circuit Breaker + Retry + TimeLimiter 설정
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 80
        recordExceptions:
          - io.grpc.StatusException
          - io.grpc.StatusRuntimeException
          - java.util.concurrent.TimeoutException
    instances:
      identity-service:
        baseConfig: default
        # 인증 서비스 — 가장 중요한 서비스이므로 보수적으로 설정.
        # 더 많은 샘플을 수집한 뒤 CB를 열고, 실패율 임계값도 낮게 유지해 빠르게 감지.
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 30
        waitDurationInOpenState: 30s
      pet-profile-service:
        baseConfig: default
        # 프로필 조회 — 읽기 위주의 단순 조회라 기본값으로 충분.
      walks-service:
        baseConfig: default
        # 산책 서비스 — 실시간성이 중요하므로 느린 호출 기준을 엄격하게 설정해 빠른 실패 유도.
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 70
      social-service:
        baseConfig: default
        # 소셜 서비스 — 피드/팔로우 등 일부 집계 연산이 있어 응답 지연을 더 허용.
        # CB 열림 시 빠르게 half-open으로 전환해 복구 속도 향상.
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 15s
      notification-service:
        baseConfig: default
        # 알림 서비스 — 비필수 기능이므로 관대한 실패율로 불필요한 CB 개방 억제.
        # CB가 열려도 짧은 대기 후 빠르게 재시도.
        failureRateThreshold: 70
        waitDurationInOpenState: 5s

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - io.grpc.StatusException
          - io.grpc.StatusRuntimeException
        ignoreExceptions:
          - com.mungcle.gateway.infrastructure.resilience.ServiceUnavailableException
    instances:
      identity-service:
        baseConfig: default
        # 인증 서비스 — 재시도를 줄여 빠른 실패(fail-fast)로 응답 지연 최소화.
        maxAttempts: 2
      pet-profile-service:
        baseConfig: default
      walks-service:
        baseConfig: default
      social-service:
        baseConfig: default
      notification-service:
        baseConfig: default
        # 알림 서비스 — 비동기 특성상 재시도를 충분히 허용해 전달 신뢰성 향상.
        maxAttempts: 5
        waitDuration: 1s

  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
    instances:
      identity-service:
        baseConfig: default
      pet-profile-service:
        baseConfig: default
      walks-service:
        baseConfig: default
      social-service:
        baseConfig: default
      notification-service:
        baseConfig: default

  # 서비스별 동시 호출 수 제한 — 한 서비스의 과부하가 전체로 전파되지 않도록 격리
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 25
        maxWaitDuration: 500ms
    instances:
      identity-service:
        baseConfig: default
        # 인증 서비스 — 모든 요청이 거치므로 높은 동시성 허용.
        maxConcurrentCalls: 50
      pet-profile-service:
        baseConfig: default
      walks-service:
        baseConfig: default
      social-service:
        baseConfig: default
      notification-service:
        baseConfig: default
        # 알림 서비스 — 비필수 기능이므로 동시성을 낮게 제한해 다른 서비스 자원 보호.
        maxConcurrentCalls: 10
