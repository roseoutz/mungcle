server:
  port: 4000

spring:
  application:
    name: api-gateway

# gRPC client channels
grpc:
  client:
    identity:
      address: static://${IDENTITY_HOST:localhost}:50051
      negotiation-type: plaintext
    pet-profile:
      address: static://${PET_PROFILE_HOST:localhost}:50052
      negotiation-type: plaintext
    walks:
      address: static://${WALKS_HOST:localhost}:50053
      negotiation-type: plaintext
    social:
      address: static://${SOCIAL_HOST:localhost}:50054
      negotiation-type: plaintext
    notification:
      address: static://${NOTIFICATION_HOST:localhost}:50055
      negotiation-type: plaintext

# JWT
jwt:
  secret: ${JWT_SECRET:mungcle-dev-secret-key-change-in-production}
  expiration: 604800000 # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        # api-gateway는 HTTP 전용 — gRPC 서버 히스토그램 불필요
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}  # 개발: 1.0, 운영: 0.1 권장
  otlp:
    tracing:
      endpoint: http://${OTEL_HOST:localhost}:4318/v1/traces

# Rate Limiting 설정
gateway:
  rate-limit:
    authenticated:
      limit: 100
      duration: 1m
    anonymous:
      limit: 20
      duration: 1m

# Resilience4j Circuit Breaker 설정
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 80
        recordExceptions:
          - io.grpc.StatusException
          - io.grpc.StatusRuntimeException
          - java.util.concurrent.TimeoutException
    instances:
      identity-service:
        baseConfig: default
      pet-profile-service:
        baseConfig: default
      walks-service:
        baseConfig: default
      social-service:
        baseConfig: default
      notification-service:
        baseConfig: default
