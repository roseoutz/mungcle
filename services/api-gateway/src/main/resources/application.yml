server:
  port: 4000

spring:
  application:
    name: api-gateway

# gRPC client channels
grpc:
  client:
    identity:
      address: static://${IDENTITY_HOST:localhost}:50051
      negotiation-type: plaintext
    pet-profile:
      address: static://${PET_PROFILE_HOST:localhost}:50052
      negotiation-type: plaintext
    walks:
      address: static://${WALKS_HOST:localhost}:50053
      negotiation-type: plaintext
    social:
      address: static://${SOCIAL_HOST:localhost}:50054
      negotiation-type: plaintext
    notification:
      address: static://${NOTIFICATION_HOST:localhost}:50055
      negotiation-type: plaintext

# JWT
jwt:
  secret: ${JWT_SECRET:mungcle-dev-secret-key-change-in-production}
  expiration: 604800000 # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        # api-gateway는 HTTP 전용 — gRPC 서버 히스토그램 불필요
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}  # 개발: 1.0, 운영: 0.1 권장
  otlp:
    tracing:
      endpoint: http://${OTEL_HOST:localhost}:4318/v1/traces
