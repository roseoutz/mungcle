{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "mungcle.namespace" . }}
  labels:
    {{- include "mungcle.labels" . | nindent 4 }}
    {{- include "mungcle.selectorLabels" (dict "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None   # headless for StatefulSet DNS
  selector:
    {{- include "mungcle.selectorLabels" (dict "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: postgres
{{- end }}
