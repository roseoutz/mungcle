apiVersion: v1
kind: ConfigMap
metadata:
  name: mungcle-config
  namespace: {{ include "mungcle.namespace" . }}
  labels:
    {{- include "mungcle.labels" . | nindent 4 }}
data:
  KAFKA_BOOTSTRAP: {{ .Values.kafka.bootstrapServers | default "kafka:9092" | quote }}
  OTEL_HOST: otel-collector
  IDENTITY_HOST: identity
  PET_PROFILE_HOST: pet-profile
  WALKS_HOST: walks
  SOCIAL_HOST: social
  NOTIFICATION_HOST: notification
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mungcle-config-db
  namespace: {{ include "mungcle.namespace" . }}
  labels:
    {{- include "mungcle.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.postgres.host | default "postgres" }}
  DB_PORT: {{ .Values.postgres.port | default "5432" | quote }}
  DB_NAME: {{ .Values.postgres.database | default "mungcle" }}
  DB_USERNAME: {{ .Values.postgres.username | default "postgres" }}
