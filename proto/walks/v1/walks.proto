syntax = "proto3";

package walks.v1;

option java_multiple_files = true;
option java_package = "com.mungcle.proto.walks.v1";

service WalksService {
  rpc StartWalk(StartWalkRequest) returns (WalkInfo);
  rpc StopWalk(StopWalkRequest) returns (WalkInfo);
  rpc GetWalk(GetWalkRequest) returns (WalkInfo);
  rpc GetNearbyWalks(GetNearbyWalksRequest) returns (GetNearbyWalksResponse);
  rpc GetMyActiveWalks(GetMyActiveWalksRequest) returns (GetMyActiveWalksResponse);
  rpc GetWalkGridCell(GetWalkGridCellRequest) returns (GetWalkGridCellResponse);
  rpc GetNearbyPatterns(GetNearbyPatternsRequest) returns (GetNearbyPatternsResponse);
}

message GetWalkRequest {
  int64 walk_id = 1;
}

message StartWalkRequest {
  int64 user_id = 1;
  int64 dog_id = 2;
  WalkType type = 3;
  double lat = 4;
  double lng = 5;
}

message StopWalkRequest {
  int64 walk_id = 1;
  int64 user_id = 2;
}

message GetNearbyWalksRequest {
  string grid_cell = 1;  // gateway가 lat/lng → gridCell 스냅 후 전달 (ADR-005)
  int64 user_id = 2;
  repeated int64 blocked_user_ids = 3;
}

message GetNearbyWalksResponse {
  repeated NearbyWalkInfo walks = 1;
}

message GetMyActiveWalksRequest {
  int64 user_id = 1;
}

message GetMyActiveWalksResponse {
  repeated WalkInfo walks = 1;
}

message GetWalkGridCellRequest {
  int64 walk_id = 1;
}

message GetWalkGridCellResponse {
  string grid_cell = 1;
}

message GetNearbyPatternsRequest {
  string grid_cell = 1;  // gateway가 lat/lng → gridCell 스냅 후 전달 (ADR-005)
  int64 user_id = 2;
  repeated int64 blocked_user_ids = 3;
}

message GetNearbyPatternsResponse {
  repeated WalkPatternInfo patterns = 1;
}

message WalkInfo {
  int64 id = 1;
  int64 dog_id = 2;
  int64 user_id = 3;
  WalkType type = 4;
  string grid_cell = 5;
  WalkStatus status = 6;
  int64 started_at = 7;
  int64 ends_at = 8;
}

message NearbyWalkInfo {
  int64 walk_id = 1;
  int64 dog_id = 2;
  int64 user_id = 3;
  int32 grid_distance = 4;
  int64 started_at = 5;
}

message WalkPatternInfo {
  int64 dog_id = 1;
  int32 typical_hour = 2;
  int32 count_last_14_days = 3;
}

enum WalkType {
  WALK_TYPE_UNSPECIFIED = 0;
  WALK_TYPE_OPEN = 1;
  WALK_TYPE_SOLO = 2;
}

enum WalkStatus {
  WALK_STATUS_UNSPECIFIED = 0;
  WALK_STATUS_ACTIVE = 1;
  WALK_STATUS_ENDED = 2;
}
